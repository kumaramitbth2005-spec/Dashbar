<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard • Khariado</title>
  <style>

    :root{
  --bg:#f6f8fb; --accent:#2f9e44; --muted:#6b7280; --card:#ffffff;
  --glass: rgba(255,255,255,0.6);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Segoe UI,Arial;background:var(--bg);color:#111}
.navbar{
  display:flex;align-items:center;gap:12px;padding:14px 20px;background:#0b1221;color:#fff;position:sticky;top:0;z-index:10;
}
.brand{font-weight:700;cursor:pointer}
.search-wrap{flex:1}
#searchBar{width:100%;padding:10px;border-radius:8px;border:0;outline:none}
.nav-actions{display:flex;gap:8px}
.btn{padding:8px 12px;border-radius:8px;border:0;cursor:pointer}
.btn.primary{background:var(--accent);color:#fff;box-shadow:0 6px 18px rgba(47,158,68,0.15)}
.btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.12)}
.btn.outline{background:transparent;border:1px solid #ddd}
.main{padding:20px}

/* HERO */
.hero{display:flex;justify-content:space-between;align-items:center;padding:40px;margin:20px;border-radius:12px;background:linear-gradient(135deg,#dff7e3,#f0fff5);overflow:hidden}
.hero-inner h1{margin:0 0 8px;font-size:28px}
.hero-visual{min-width:180px}
.card-preview{background:#fff;padding:12px;border-radius:10px;box-shadow:0 6px 16px rgba(0,0,0,0.06)}

/* sections */
.section{padding:30px 20px;margin:12px 20px;background:var(--card);border-radius:10px;box-shadow:0 6px 18px rgba(17,24,39,0.04)}
.cards{display:flex;gap:16px;flex-wrap:wrap}
.flip-card{width:200px;height:140px;perspective:1000px;cursor:pointer}
.flip-inner{position:relative;height:100%;transition:0.7s;transform-style:preserve-3d}
.flip-card:hover .flip-inner{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:600}
.front{background:linear-gradient(135deg,#111827,#1f2937);color:#fff}
.back{background:linear-gradient(135deg,#e6ffed,#d1ffd8);transform:rotateY(180deg)}

/* forms */
.sell-form input,.sell-form select,.sell-form textarea{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
.row{display:flex;gap:10px}
.row input{flex:1}

/* estimate box */
.estimate-box{padding:10px;background:#fff;border-radius:8px;margin-top:8px;box-shadow:0 6px 10px rgba(17,24,39,0.03)}

/* modal */
.modal{display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.45);align-items:center;justify-content:center}
.modal-card{background:#fff;padding:18px;border-radius:10px;width:320px;box-shadow:0 10px 40px rgba(2,6,23,0.2);}

/* gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gcard{height:120px;background:linear-gradient(180deg,#fff,#f3f6fb);display:flex;align-items:center;justify-content:center;border-radius:8px}

/* track */
.track-row{display:flex;gap:8px}
.track-result{margin-top:12px;padding:10px;background:#fff;border-radius:8px}

/* animations */
.fade-in{animation:fadeIn 0.8s ease both}
.float-anim{animation:float 4s ease-in-out infinite}
.bounce{animation:bounce 1.2s infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* DASHBOARD */
.dashboard-body{display:flex}
.sidebar{width:220px;background:#0b1221;color:#fff;min-height:100vh;padding:20px}
.sidebar nav{margin-top:20px;display:flex;flex-direction:column;gap:8px}
.sidebar a{color:#cbd5e1;padding:8px;border-radius:8px;text-decoration:none}
.sidebar a.active{background:#0f1724;color:#fff}
.dash-main{flex:1;padding:18px}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.cards-grid{display:flex;gap:12px;margin-bottom:12px}
.stat-card{background:#fff;padding:16px;border-radius:10px;flex:1;box-shadow:0 10px 20px rgba(2,6,23,0.06)}
.dash-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden}
.dash-table th, .dash-table td{padding:10px;border-bottom:1px solid #f1f5f9;text-align:left}

/* responsive */
@media(max-width:900px){
  .hero{flex-direction:column}
  .gallery-grid{grid-template-columns:repeat(2,1fr)}
  .sidebar{display:none}
}

  </style>
</head>
<body class="dashboard-body">
  <aside class="sidebar slide-left">
    <div class="brand">♻ Khariado</div>
    <nav>
      <a href="#" class="active" data-section="overview" onclick="dashNav(event)">Overview</a>
      <a href="#" data-section="pickups" onclick="dashNav(event)">Pickups</a>
      <a href="#" data-section="wallet" onclick="dashNav(event)">Wallet</a>
      <a href="#" data-section="settings" onclick="dashNav(event)">Settings</a>
      <a href="#" data-section="logout" onclick="logout()">Logout</a>
    </nav>
  </aside>

  <div class="dash-main">
    <header class="dash-header">
      <div>
        <h2 id="dashGreeting">Hello, User</h2>
        <p class="muted" id="dashDate">—</p>
      </div>
      <div class="dash-actions">
        <button class="btn" onclick="openProfile()">Profile</button>
      </div>
    </header>

    <section id="overview" class="dash-section active">
      <div class="cards-grid">
        <div class="stat-card">Total Pickups <strong id="totalPickups">0</strong></div>
        <div class="stat-card">Earnings <strong id="earnings">₹0</strong></div>
        <div class="stat-card">Pending <strong id="pendingCount">0</strong></div>
      </div>
      <div class="chart-wrap">
        <canvas id="rateChart" width="400" height="150"></canvas>
      </div>
    </section>

    <section id="pickups" class="dash-section">
      <h3>Pickup History</h3>
      <table class="dash-table" id="pickupTable">
        <thead><tr><th>ID</th><th>Date</th><th>Type</th><th>Weight</th><th>Status</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="wallet" class="dash-section">
      <h3>Wallet & Points</h3>
      <p>Your balance: <strong id="walletBalance">₹0</strong></p>
    </section>

    <section id="settings" class="dash-section">
      <h3>Settings</h3>
      <p>Profile and preferences (mock)</p>
    </section>
  </div>

  <script>
    // read user
const user = JSON.parse(localStorage.getItem('kh_user') || 'null');
if(!user) { location.href = 'index.html'; }
document.getElementById('dashGreeting').innerText = `Hello, ${user.name || 'User'}`;
document.getElementById('dashDate').innerText = new Date().toLocaleString();

// populate stats from mockPickups (uses same mock array from script.js; copy mockPickups here too)
const pickups = [
  {id:'PK1001', date:'2025-11-10', type:'Electronics', weight:4.5, status:'Delivered', price:135},
  {id:'PK1002', date:'2025-11-12', type:'Books & Paper', weight:10, status:'Out for Pickup', price:100},
  {id:'PK1003', date:'2025-11-13', type:'Plastic', weight:6, status:'Scheduled', price:30},
];
document.getElementById('totalPickups').innerText = pickups.length;
document.getElementById('earnings').innerText = '₹' + pickups.reduce((s,p)=>s+p.price,0);
document.getElementById('pendingCount').innerText = pickups.filter(p=>p.status!=='Delivered').length;
document.getElementById('walletBalance').innerText = '₹' + (pickups.reduce((s,p)=>s+p.price,0) * 0.8);

// fill table
const tbody = document.querySelector('#pickupTable tbody');
pickups.forEach(p=>{
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${p.id}</td><td>${p.date}</td><td>${p.type}</td><td>${p.weight}kg</td><td>${p.status}</td>`;
  tbody.appendChild(tr);
});

// small chart implementation (lines)
function drawRateChart(){
  const canvas = document.getElementById('rateChart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const labels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const data = [28,30,29,31,30,32,30]; // mock
  // clear
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // scale
  const max = Math.max(...data) + 2;
  const w = canvas.width, h = canvas.height;
  ctx.beginPath(); ctx.strokeStyle='#1f8a3d'; ctx.lineWidth=2;
  data.forEach((v,i)=>{
    const x = (i/(data.length-1)) * (w-40) + 20;
    const y = h - 20 - (v/max)*(h-40);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    // dot
    ctx.fillStyle='#1f8a3d'; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
  });
  ctx.stroke();
}
drawRateChart();

// dashboard nav
function dashNav(e){
  e.preventDefault();
  document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('.dash-section').forEach(s=>s.classList.remove('active'));
  document.getElementById(e.target.dataset.section).classList.add('active');
}
function logout(){ localStorage.removeItem('kh_user'); location.href='index.html'; }
function openProfile(){ alert('Profile modal (mock)'); }

  </script>
</body>
</html>
